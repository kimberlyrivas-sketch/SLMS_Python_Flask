<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Library</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
/* ── CAROUSEL ── */
.carousel-wrap {
  margin: 1rem 1.25rem 0.75rem;
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  height: 160px;
  background: var(--bg-ter);
  border: 0.5px solid var(--border-ter);
}
.carousel-track {
  display: flex;
  height: 100%;
  transition: transform 0.5s cubic-bezier(.4,0,.2,1);
}
.carousel-slide {
  min-width: 100%;
  height: 100%;
  position: relative;
}
.carousel-slide img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.carousel-slide::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, rgba(20,5,8,0.28) 0%, rgba(114,47,55,0.18) 100%);
}
.carousel-dots {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 5;
}
.carousel-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.5);
  transition: background .3s, transform .3s;
  cursor: pointer;
}
.carousel-dot.active {
  background: #fff;
  transform: scale(1.35);
}
.carousel-arrow {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.22);
  border: none; border-radius: 50%;
  width: 28px; height: 28px;
  color: #fff; cursor: pointer; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  transition: background .2s;
}
.carousel-arrow:hover { background: rgba(255,255,255,0.42); }
.carousel-arrow.prev { left: 10px; }
.carousel-arrow.next { right: 10px; }

/* ── CLOUD CHAT FAB ── */
.chat-fab-wrap {
  position: fixed;
  bottom: calc(var(--bottom-nav-height) + 14px);
  right: 16px;
  z-index: 140;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.chat-fab-label {
  font-size: 10px;
  font-weight: 800;
  color: var(--burgundy);
  letter-spacing: 0.03em;
  text-align: center;
  line-height: 1.2;
  text-shadow: 0 1px 4px rgba(255,255,255,0.8);
  font-family: var(--font-body);
}
.chat-fab-btn {
  width: 58px; height: 44px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  position: relative;
  transition: transform .15s;
  filter: drop-shadow(0 4px 12px rgba(114,47,55,0.38));
}
.chat-fab-btn:hover { transform: scale(1.08) translateY(-2px); }
.chat-fab-btn:active { transform: scale(0.96); }
.chat-fab-btn svg { width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="toast" class="toast" style="display:none"></div>

<div class="layout">
  <div class="main-wrap">

    <!-- TOPBAR -->
    <header class="topbar">
      <div>
        <div class="topbar-sub" id="roleLabel"></div>
        <h1 class="page-title" id="pageTitle">Home</h1>
      </div>
      <button class="role-badge" onclick="openProfile()" id="roleBadgeBtn">
        <div class="role-badge-avatar" id="roleBadgeAvatar">?</div>
        <span class="role-badge-label" id="roleBadgeLabel">User</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--burgundy)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </header>

    <main class="main-content" id="mainContent"></main>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<!-- PROFILE SHEET -->
<div class="profile-panel" id="profilePanel" style="display:none">
  <div class="profile-overlay" onclick="closeProfile()"></div>
  <div class="profile-sheet">
    <div class="profile-handle"></div>
    <div class="profile-avatar-wrap"><div class="profile-avatar" id="profileAvatar"></div></div>
    <div class="profile-name" id="profileName"></div>
    <div class="profile-email" id="profileEmail"></div>
    <div class="profile-badge-wrap" id="profileBadge"></div>
    <div class="profile-card">
      <div class="profile-row"><span class="profile-row-label">Member since</span><span id="profileSince"></span></div>
      <div class="profile-row"><span class="profile-row-label">Role</span><span id="profileRole" style="text-transform:capitalize"></span></div>
      <div class="profile-row"><span class="profile-row-label">Active borrows</span><span id="profileBorrows"></span></div>
    </div>
    <button class="btn btn-danger-outline" style="width:100%;margin-top:12px" onclick="doLogout()">Sign out</button>
    <button class="btn btn-outline" style="width:100%;margin-top:8px" onclick="closeProfile()">Close</button>
  </div>
</div>

<!-- CHATBOT -->
<div class="chatbot" id="chatbot" style="display:none">
  <div class="chatbot-header">
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div><div class="chatbot-title">Library Assistant</div><div class="chatbot-sub">AI-powered · always here</div></div>
    </div>
    <button class="chatbot-close" onclick="toggleChat()">×</button>
  </div>
  <div class="chatbot-messages" id="chatMessages"></div>
  <div class="chatbot-input-row">
    <input id="chatInput" placeholder="Ask about books, borrows…" onkeydown="if(event.key==='Enter')sendChat()">
    <button id="chatSend" onclick="sendChat()">Send</button>
  </div>
</div>

<!-- Cloud Chat FAB — visible for ALL users -->
<div class="chat-fab-wrap" id="chatFabWrap">
  <button class="chat-fab-btn" onclick="toggleChat()" title="AI Assistant">
    <!-- Cloud SVG shape filled with burgundy -->
    <svg viewBox="0 0 58 44" xmlns="http://www.w3.org/2000/svg">
      <!-- Cloud body -->
      <path d="
        M14 38
        C6.268 38 0 31.732 0 24
        C0 17.15 4.84 11.42 11.36 10.18
        C13.18 4.3 18.6 0 25 0
        C30.04 0 34.5 2.56 37.28 6.44
        C38.48 6.16 39.72 6 41 6
        C49.28 6 56 12.72 56 21
        C56 21.34 55.98 21.68 55.96 22.02
        C57.22 23.34 58 25.08 58 27
        C58 31.42 54.42 35 50 35
        L14 38Z
      " fill="var(--burgundy)"/>
      <!-- Chat bubble tail -->
      <path d="M18 38 L14 44 L24 38Z" fill="var(--burgundy)"/>
      <!-- Chat dots -->
      <circle cx="22" cy="22" r="2.5" fill="white" opacity="0.9"/>
      <circle cx="29" cy="22" r="2.5" fill="white" opacity="0.9"/>
      <circle cx="36" cy="22" r="2.5" fill="white" opacity="0.9"/>
    </svg>
  </button>
  <div class="chat-fab-label">AI Assistant</div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════ */
const CATEGORY_COLORS = {{ category_colors|safe }};
const USER = {{ user|tojson }};
let activeTab = 'dashboard';
let chatHistory = [{role:'assistant',content:"Hi! I'm your Library Assistant. Ask me about books, borrows, or reservations!"}];

const CAROUSEL_IMGS = [
  "https://i.pinimg.com/736x/74/83/2e/74832e8283567e930b79a9ef7fd7a060.jpg",
  "https://i.pinimg.com/736x/39/21/fc/3921fc2dbb68b4d47d356c6514c1d87b.jpg",
  "https://i.pinimg.com/1200x/e5/85/31/e585313656f90aa1519b12d678da77b8.jpg",
  "https://i.pinimg.com/736x/01/f3/48/01f3487ddeedb5a4dcc9c11562ee30ce.jpg",
  "https://i.pinimg.com/1200x/3c/05/db/3c05db71e182b56e650d565b909d805d.jpg",
  "https://i.pinimg.com/736x/9f/d4/94/9fd49434235692bfa219b27d561914d8.jpg",
  "https://i.pinimg.com/1200x/a1/6a/57/a16a57566d623e033ca3f81673968bee.jpg",
];
let carouselIdx = 0;
let carouselTimer = null;

/* SVG icon paths */
const ICONS = {
  home:         '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  book:         '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  archive:      '<polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/>',
  users:        '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  'bar-chart':  '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
  user:         '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  clipboard:    '<path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>',
  'book-open':  '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
  'check-circle':'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
  clock:        '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  alert:        '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
  trending:     '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',
  award:        '<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>',
  search:       '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  plus:         '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  edit:         '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
  chevron:      '<polyline points="6 9 12 15 18 9"/>',
};

/* Nav: librarian uses "inventory" label but renders analytics */
const NAV_ITEMS = {
  librarian: [
    {id:'dashboard', label:'Home',      icon:'home'},
    {id:'books',     label:'Books',     icon:'book'},
    {id:'inventory', label:'Inventory', icon:'archive'},  /* renders analytics */
    {id:'profile',   label:'Profile',   icon:'user'}
  ],
  staff: [
    {id:'dashboard', label:'Home',      icon:'home'},
    {id:'requests',  label:'Requests',  icon:'clipboard'},
    {id:'inventory', label:'Inventory', icon:'archive'},  /* renders analytics */
    {id:'profile',   label:'Profile',   icon:'user'}
  ],
  student: [
    {id:'dashboard', label:'Home',         icon:'home'},
    {id:'browse',    label:'Books',        icon:'book'},
    {id:'mybooks',   label:'Borrow',       icon:'book-open'},
    {id:'clearance', label:'Clearance',    icon:'check-circle'},
    {id:'profile',   label:'Profile',      icon:'user'}
  ],
  teacher: [
    {id:'dashboard', label:'Home',         icon:'home'},
    {id:'browse',    label:'Books',        icon:'book'},
    {id:'mybooks',   label:'Borrow',       icon:'book-open'},
    {id:'clearance', label:'Clearance',    icon:'check-circle'},
    {id:'profile',   label:'Profile',      icon:'user'}
  ],
};

function svg(icon, size=20, color='currentColor') {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[icon]||''}</svg>`;
}

function badge(label, type) {
  const styles = {
    borrowed:{bg:'#E6F1FB',c:'#185FA5'}, returned:{bg:'#EAF3DE',c:'#3B6D11'},
    overdue:{bg:'#FCEBEB',c:'#A32D2D'}, pending:{bg:'#FAEEDA',c:'#854F0B'},
    approved:{bg:'#EAF3DE',c:'#3B6D11'}, declined:{bg:'#FCEBEB',c:'#A32D2D'},
    archived:{bg:'#F1EFE8',c:'#5F5E5A'}, active:{bg:'#EAF3DE',c:'#3B6D11'},
    info:{bg:'#E6F1FB',c:'#185FA5'}, success:{bg:'#EAF3DE',c:'#3B6D11'},
    warning:{bg:'#FAEEDA',c:'#854F0B'}, danger:{bg:'#FCEBEB',c:'#A32D2D'},
  };
  const s = styles[type] || styles.info;
  return `<span style="background:${s.bg};color:${s.c};border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap">${label}</span>`;
}

function catBadge(cat) {
  const c = CATEGORY_COLORS[cat] || '#534AB7';
  return `<span style="font-size:10px;background:${c}18;color:${c};padding:2px 7px;border-radius:4px;font-weight:700">${cat}</span>`;
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='success'?'#0F6E56':type==='warning'?'#854F0B':'#A32D2D';
  t.style.display = 'block';
  setTimeout(()=>t.style.display='none', 3000);
}

async function doLogout() {
  await fetch('/api/logout', {method:'POST'});
  window.location.href = '/login';
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('roleLabel').textContent = USER.role.charAt(0).toUpperCase()+USER.role.slice(1)+' Portal';
  document.getElementById('roleBadgeAvatar').textContent = USER.username[0].toUpperCase();
  document.getElementById('roleBadgeLabel').textContent = USER.role.charAt(0).toUpperCase()+USER.role.slice(1);
  buildNav();
  navigate('dashboard');
});

/* ═══════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════ */
function buildNav() {
  const items = NAV_ITEMS[USER.role] || [];
  document.getElementById('bottomNav').innerHTML = items.map(item => `
    <button class="nav-item" onclick="navigate('${item.id}')" id="nav-${item.id}">
      <div class="nav-icon-wrap ${item.id===activeTab?'active':''}">
        ${svg(item.icon, 20, item.id===activeTab?'var(--burgundy)':'var(--text-sec)')}
        ${item.id==='requests'?'<span class="nav-badge" id="reqBadge" style="display:none"></span>':''}
      </div>
      <span class="nav-label ${item.id===activeTab?'active':''}">${item.label}</span>
    </button>
  `).join('');
}

function navigate(tab) {
  if (tab==='profile') { openProfile(); return; }
  activeTab = tab;
  buildNav();
  const labels = {
    dashboard:'Home', books:'Books', inventory:'Inventory',
    analytics:'Analytics', requests:'Requests',
    browse:'Books', mybooks:'Borrow', clearance:'Clearance'
  };
  document.getElementById('pageTitle').textContent = labels[tab]||'Home';
  document.getElementById('mainContent').innerHTML = '<div class="loading">Loading…</div>';

  /* Stop carousel timer on tab change */
  if (carouselTimer) { clearInterval(carouselTimer); carouselTimer = null; }

  if (tab==='dashboard')            renderDashboard();
  else if (tab==='books')           renderBooks();
  else if (tab==='inventory')       renderAnalytics();   /* BOTH librarian & staff → analytics */
  else if (tab==='analytics')       renderAnalytics();
  else if (tab==='requests')        renderRequests();
  else if (tab==='browse')          renderBrowse();
  else if (tab==='mybooks')         renderMyBooks();
  else if (tab==='clearance')       renderClearance();
}

/* ═══════════════════════════════════════════════
   PROFILE
═══════════════════════════════════════════════ */
async function openProfile() {
  document.getElementById('profilePanel').style.display='flex';
  document.getElementById('profileAvatar').textContent = USER.username[0].toUpperCase();
  document.getElementById('profileName').textContent = USER.username;
  document.getElementById('profileEmail').textContent = USER.email||'';
  document.getElementById('profileRole').textContent = USER.role;
  document.getElementById('profileBadge').innerHTML = badge(USER.role,'info');
  const since = USER.created_at ? new Date(USER.created_at).toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'}) : '—';
  document.getElementById('profileSince').textContent = since;
  try {
    const borrows = await fetch('/api/borrows').then(r=>r.json());
    document.getElementById('profileBorrows').textContent = borrows.filter(b=>b.userId===USER.id&&b.status==='borrowed').length;
  } catch { document.getElementById('profileBorrows').textContent='—'; }
}
function closeProfile() { document.getElementById('profilePanel').style.display='none'; }

/* ═══════════════════════════════════════════════
   IMAGE CAROUSEL (all dashboards)
═══════════════════════════════════════════════ */
function carouselHTML() {
  return `
  <div class="carousel-wrap" id="carouselWrap">
    <div class="carousel-track" id="carouselTrack">
      ${CAROUSEL_IMGS.map((src, i) => `
        <div class="carousel-slide">
          <img src="${src}" alt="Library image ${i+1}" loading="${i===0?'eager':'lazy'}">
        </div>`).join('')}
    </div>
    <button class="carousel-arrow prev" onclick="carouselMove(-1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="carousel-arrow next" onclick="carouselMove(1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="carousel-dots" id="carouselDots">
      ${CAROUSEL_IMGS.map((_, i) => `<div class="carousel-dot ${i===0?'active':''}" onclick="carouselGo(${i})"></div>`).join('')}
    </div>
  </div>`;
}

function carouselMove(dir) {
  const total = CAROUSEL_IMGS.length;
  carouselIdx = (carouselIdx + dir + total) % total;
  carouselApply();
}

function carouselGo(idx) {
  carouselIdx = idx;
  carouselApply();
}

function carouselApply() {
  const track = document.getElementById('carouselTrack');
  const dots = document.querySelectorAll('.carousel-dot');
  if (!track) return;
  track.style.transform = `translateX(-${carouselIdx * 100}%)`;
  dots.forEach((d, i) => d.classList.toggle('active', i === carouselIdx));
}

function startCarouselAuto() {
  carouselIdx = 0;
  if (carouselTimer) clearInterval(carouselTimer);
  carouselTimer = setInterval(() => carouselMove(1), 3500);
}

/* ═══════════════════════════════════════════════
   CLICKABLE STAT TILE HELPER
═══════════════════════════════════════════════ */
function statTile(id, icon, value, label, iconBg, iconColor) {
  return `
  <div class="stat-tile" id="tile-${id}" onclick="toggleTile('${id}')">
    <div class="stat-tile-icon" style="background:${iconBg}">
      ${svg(icon, 20, iconColor)}
    </div>
    <div class="stat-tile-value">${value}</div>
    <div class="stat-tile-label">${label}</div>
    <div class="stat-tile-chevron">${svg('chevron',14,'var(--burgundy-light)')}</div>
  </div>`;
}

function tileDetailPanel(id) {
  return `<div class="stat-tile-detail" id="detail-${id}" style="grid-column:1/-1"></div>`;
}

function toggleTile(id) {
  const tile   = document.getElementById(`tile-${id}`);
  const detail = document.getElementById(`detail-${id}`);
  if (!tile || !detail) return;
  const isOpen = tile.classList.contains('open');
  document.querySelectorAll('.stat-tile').forEach(t=>t.classList.remove('open'));
  document.querySelectorAll('.stat-tile-detail').forEach(d=>{d.classList.remove('open');d.innerHTML='';});
  if (isOpen) return;
  tile.classList.add('open');
  detail.classList.add('open');
  detail.innerHTML = '<div class="detail-empty">Loading…</div>';
  loadTileDetail(id, detail);
}

async function loadTileDetail(id, el) {
  try {
    const [books, borrows, reservations] = await Promise.all([
      fetch('/api/books').then(r=>r.json()),
      fetch('/api/borrows').then(r=>r.json()),
      fetch('/api/reservations').then(r=>r.json()),
    ]);

    let rows = [];

    if (id === 'total-books') {
      const active = books.filter(b=>b.status!=='archived');
      rows = active.length===0
        ? '<div class="detail-empty">No books.</div>'
        : active.map(b=>`
          <div class="detail-row">
            <div>${svg('book',14,'var(--burgundy)')}</div>
            <div style="flex:1"><div class="detail-row-title">${b.title}</div><div class="detail-row-sub">${b.author} · ${b.copies} copies</div></div>
            ${catBadge(b.category)}
          </div>`).join('');

    } else if (id === 'borrowed') {
      const active = borrows.filter(b=>b.status==='borrowed');
      rows = active.length===0
        ? '<div class="detail-empty">No active borrows.</div>'
        : active.map(b=>`
          <div class="detail-row">
            <div>${svg('book-open',14,'#185FA5')}</div>
            <div style="flex:1"><div class="detail-row-title">${b.bookTitle}</div><div class="detail-row-sub">${b.username} · Due: ${b.dueDate}</div></div>
            ${badge('borrowed','borrowed')}
          </div>`).join('');

    } else if (id === 'reservations') {
      const pending = reservations.filter(r=>r.status==='pending');
      rows = pending.length===0
        ? '<div class="detail-empty">No reservations.</div>'
        : pending.map(r=>`
          <div class="detail-row">
            <div>${svg('clock',14,'#854F0B')}</div>
            <div style="flex:1"><div class="detail-row-title">${r.bookTitle}</div><div class="detail-row-sub">${r.username} · ${r.reservedAt}</div></div>
            ${badge('pending','pending')}
          </div>`).join('');

    } else if (id === 'archived') {
      const archived = books.filter(b=>b.status==='archived');
      rows = archived.length===0
        ? '<div class="detail-empty">No archived books.</div>'
        : archived.map(b=>`
          <div class="detail-row">
            <div>${svg('archive',14,'#5F5E5A')}</div>
            <div style="flex:1"><div class="detail-row-title">${b.title}</div><div class="detail-row-sub">${b.author}</div></div>
            ${badge('archived','archived')}
          </div>`).join('');

    } else if (id === 'overdue') {
      const overdue = borrows.filter(b=>b.status==='overdue'||(b.status==='borrowed'&&new Date(b.dueDate)<new Date()));
      rows = overdue.length===0
        ? '<div class="detail-empty">No overdue books.</div>'
        : overdue.map(b=>`
          <div class="detail-row">
            <div>${svg('alert',14,'#A32D2D')}</div>
            <div style="flex:1"><div class="detail-row-title">${b.bookTitle}</div><div class="detail-row-sub">${b.username} · Due: ${b.dueDate}</div></div>
            ${badge('overdue','overdue')}
          </div>`).join('');

    } else if (id === 'active-loans') {
      const active = borrows.filter(b=>b.status==='borrowed');
      rows = active.length===0
        ? '<div class="detail-empty">No active loans.</div>'
        : active.map(b=>`
          <div class="detail-row">
            <div>${svg('book-open',14,'#185FA5')}</div>
            <div style="flex:1"><div class="detail-row-title">${b.bookTitle}</div><div class="detail-row-sub">${b.username} · Due: ${b.dueDate}</div></div>
            ${badge('borrowed','borrowed')}
          </div>`).join('');

    } else if (id === 'returned') {
      const ret = borrows.filter(b=>b.status==='returned');
      rows = ret.length===0
        ? '<div class="detail-empty">No returned books.</div>'
        : ret.map(b=>`
          <div class="detail-row">
            <div>${svg('check-circle',14,'#3B6D11')}</div>
            <div style="flex:1"><div class="detail-row-title">${b.bookTitle}</div><div class="detail-row-sub">${b.username} · Returned: ${b.returnedAt||'—'}</div></div>
            ${badge('returned','returned')}
          </div>`).join('');

    } else if (id === 'pending-req') {
      const pending = await fetch('/api/requests').then(r=>r.json()).then(d=>d.filter(r=>r.status==='pending'));
      rows = pending.length===0
        ? '<div class="detail-empty">No pending requests.</div>'
        : pending.map(r=>`
          <div class="detail-row">
            <div>${svg('clipboard',14,'#854F0B')}</div>
            <div style="flex:1"><div class="detail-row-title">${r.bookTitle}</div><div class="detail-row-sub">${r.studentName} · ${r.requestDate}</div></div>
            ${badge('pending','pending')}
          </div>`).join('');
    }

    el.innerHTML = typeof rows === 'string' ? rows : rows;
  } catch(e) {
    el.innerHTML = '<div class="detail-empty">Error loading data.</div>';
  }
}

/* ═══════════════════════════════════════════════
   BOOKS (Librarian)
═══════════════════════════════════════════════ */
async function renderBooks() {
  const books = await fetch('/api/books').then(r=>r.json());
  const categories = [...new Set(books.map(b=>b.category))];

  document.getElementById('mainContent').innerHTML = `
    <div class="search-bar-wrap">
      <div class="search-bar">${svg('search',15,'var(--text-sec)')}<input id="bookSearch" placeholder="Search title or author…" oninput="filterBooks()"></div>
      <button class="search-submit" onclick="filterBooks()">${svg('search',15,'#fff')}</button>
    </div>
    <div style="padding:0.75rem 1.25rem 0;display:flex;gap:8px;align-items:center;justify-content:space-between">
      <select id="bookCat" class="select-input" onchange="filterBooks()" style="flex:1;max-width:160px">
        <option value="all">All Categories</option>
        ${categories.map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
      <button class="btn btn-primary btn-sm" onclick="openAddBook()" style="border-radius:50px;white-space:nowrap">
        ${svg('plus',14,'#fff')} Add Book
      </button>
    </div>
    <div class="view-pad" style="padding-top:0.75rem">
      <div class="book-grid" id="bookList"></div>
    </div>
    ${bookModal()}`;

  window._books = books;
  filterBooks();
}

function filterBooks() {
  const q   = (document.getElementById('bookSearch')?.value||'').toLowerCase();
  const cat = document.getElementById('bookCat')?.value || 'all';
  const filtered = (window._books||[]).filter(b =>
    (b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)) &&
    (cat==='all'||b.category===cat));

  document.getElementById('bookList').innerHTML = filtered.length===0
    ? '<div class="empty">No books found.</div>'
    : filtered.map(book => {
        const archived = book.status==='archived';
        const cover = book.cover_url
          ? `<img src="${book.cover_url}" alt="cover">`
          : `<div class="book-cover-placeholder">📚</div>`;
        return `
        <div class="book-card">
          <div class="book-cover-wrap">${cover}</div>
          <div class="book-card-body">
            <div class="book-card-title">${book.title}${archived?'<span style="font-size:10px;color:#999"> (archived)</span>':''}</div>
            <div class="book-card-author">${book.author}</div>
            <div style="margin-bottom:8px">${catBadge(book.category)}</div>
            <div class="book-card-actions">
              <button class="btn-update" onclick='openEditBook(${JSON.stringify(book)})'>
                ${svg('edit',11,'#fff')} Update
              </button>
              <button class="btn-archive-red" onclick="archiveBook(${book.id})">
                ${svg('archive',11,'#fff')} ${archived?'Restore':'Archive'}
              </button>
            </div>
          </div>
        </div>`;
      }).join('');
}

function bookModal() {
  const cats = ['Technology','History','Math','Literature','Science','Social','Other'];
  return `
  <div class="modal-overlay" id="bookModal" style="display:none" onclick="closeBookModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><h3 id="bookModalTitle">Add Book</h3><button onclick="closeBookModal()" class="modal-close">×</button></div>
      <input type="hidden" id="bookModalId">
      <div class="field-inner">
        <label>Book Cover</label>
        <div class="cover-upload-area" onclick="document.getElementById('coverFileInput').click()">
          <img id="coverPreview" src="" alt="" style="display:none;width:80px;height:108px;object-fit:cover;border-radius:var(--radius-md)">
          <div id="coverPlaceholder" style="display:flex;flex-direction:column;align-items:center;text-align:center">
            <div style="font-size:28px;margin-bottom:6px">📚</div>
            <div style="font-size:12px;color:var(--text-sec)">Click to upload cover</div>
          </div>
        </div>
        <input type="file" id="coverFileInput" accept="image/*" style="display:none" onchange="previewCover(event)">
        <input type="hidden" id="bm_cover_url">
      </div>
      <div class="field-inner"><label>Title</label><input id="bm_title" class="search-input" style="width:100%"></div>
      <div class="field-inner"><label>Author</label><input id="bm_author" class="search-input" style="width:100%"></div>
      <div class="field-inner"><label>Category</label><select id="bm_category" class="select-input" style="width:100%">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="field-inner"><label>Price (₱)</label><input type="number" id="bm_price" class="search-input" style="width:100%"></div>
      <div class="field-inner"><label>Copies</label><input type="number" id="bm_copies" class="search-input" style="width:100%"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-outline btn-sm" onclick="closeBookModal()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveBook()">Save</button>
      </div>
    </div>
  </div>`;
}

function previewCover(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2*1024*1024) { showToast('Image too large (max 2MB).','warning'); return; }
  const r = new FileReader();
  r.onload = ev => {
    document.getElementById('coverPreview').src = ev.target.result;
    document.getElementById('coverPreview').style.display = 'block';
    document.getElementById('coverPlaceholder').style.display = 'none';
    document.getElementById('bm_cover_url').value = ev.target.result;
  };
  r.readAsDataURL(file);
}

function openAddBook() {
  document.getElementById('bookModalTitle').textContent = 'Add New Book';
  document.getElementById('bookModalId').value = '';
  ['bm_title','bm_author','bm_price','bm_copies'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('bm_cover_url').value = '';
  document.getElementById('coverPreview').style.display = 'none';
  document.getElementById('coverPlaceholder').style.display = 'flex';
  document.getElementById('bookModal').style.display = 'flex';
}

function openEditBook(book) {
  document.getElementById('bookModalTitle').textContent = 'Edit Book';
  document.getElementById('bookModalId').value = book.id;
  document.getElementById('bm_title').value = book.title;
  document.getElementById('bm_author').value = book.author;
  document.getElementById('bm_category').value = book.category;
  document.getElementById('bm_price').value = book.price;
  document.getElementById('bm_copies').value = book.copies;
  document.getElementById('bm_cover_url').value = book.cover_url||'';
  const preview = document.getElementById('coverPreview');
  if (book.cover_url) { preview.src=book.cover_url; preview.style.display='block'; document.getElementById('coverPlaceholder').style.display='none'; }
  else { preview.style.display='none'; document.getElementById('coverPlaceholder').style.display='flex'; }
  document.getElementById('bookModal').style.display='flex';
}

function closeBookModal() { document.getElementById('bookModal').style.display='none'; }

async function saveBook() {
  const id = document.getElementById('bookModalId').value;
  const payload = {
    title: document.getElementById('bm_title').value,
    author: document.getElementById('bm_author').value,
    category: document.getElementById('bm_category').value,
    price: document.getElementById('bm_price').value,
    copies: document.getElementById('bm_copies').value,
    cover_url: document.getElementById('bm_cover_url').value,
  };
  if (!payload.title||!payload.author) { showToast('Title and author required.','warning'); return; }
  if (id) {
    await fetch(`/api/books/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    showToast('Book updated!');
  } else {
    await fetch('/api/books',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    showToast('Book added!');
  }
  closeBookModal();
  renderBooks();
}

async function archiveBook(id) {
  await fetch(`/api/books/${id}/archive`,{method:'POST'});
  showToast('Book status updated.');
  renderBooks();
}

/* ═══════════════════════════════════════════════
   REQUESTS (staff) — borrow requests + reservations
═══════════════════════════════════════════════ */
async function renderRequests() {
  const [requests, borrows, reservations] = await Promise.all([
    fetch('/api/requests').then(r=>r.json()),
    fetch('/api/borrows').then(r=>r.json()),
    fetch('/api/reservations').then(r=>r.json()),
  ]);

  const pendingBorrows = requests.filter(r=>r.status==='pending');
  const pendingRes     = reservations.filter(r=>r.status==='pending');
  const totalPending   = pendingBorrows.length + pendingRes.length;

  const badge_el = document.getElementById('reqBadge');
  if (badge_el) {
    badge_el.textContent = totalPending;
    badge_el.style.display = totalPending ? 'inline' : 'none';
  }

  document.getElementById('mainContent').innerHTML = `
    <div class="view-pad" style="padding-top:1rem">

      <!-- BORROW REQUESTS -->
      <h2 class="view-title" style="display:flex;align-items:center;gap:8px">
        ${svg('clipboard',16,'var(--burgundy)')} Borrow Requests
        ${pendingBorrows.length ? `<span style="background:var(--burgundy);color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;font-family:var(--font-body)">${pendingBorrows.length}</span>` : ''}
      </h2>
      ${pendingBorrows.length === 0
        ? '<div class="empty" style="margin-bottom:1rem">No pending borrow requests.</div>'
        : pendingBorrows.map(req=>`
          <div class="card-row" style="margin-bottom:10px;border-left:3px solid #185FA5">
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${req.bookTitle}</div>
              <div style="font-size:12px;color:var(--text-sec);margin-top:2px">
                By <strong>${req.studentName}</strong> · ${req.requestDate}
              </div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button class="btn btn-success btn-sm" onclick="approveReq(${req.id})" style="border-radius:50px;font-size:12px;padding:6px 14px">✓ Approve</button>
              <button class="btn btn-danger-outline btn-sm" onclick="declineReq(${req.id})" style="border-radius:50px;font-size:12px;padding:6px 14px">✕ Decline</button>
            </div>
          </div>`).join('')}

      <!-- RESERVATIONS -->
      <h2 class="view-title" style="margin-top:1.5rem;display:flex;align-items:center;gap:8px">
        ${svg('clock',16,'var(--burgundy)')} Reservations
        ${pendingRes.length ? `<span style="background:var(--burgundy);color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;font-family:var(--font-body)">${pendingRes.length}</span>` : ''}
      </h2>
      ${pendingRes.length === 0
        ? '<div class="empty" style="margin-bottom:1rem">No pending reservations.</div>'
        : pendingRes.map(res=>`
          <div class="card-row" style="margin-bottom:10px;border-left:3px solid #854F0B">
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${res.bookTitle}</div>
              <div style="font-size:12px;color:var(--text-sec);margin-top:2px">
                By <strong>${res.username}</strong> · Reserved: ${res.reservedAt}
              </div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button class="btn btn-success btn-sm" onclick="approveRes(${res.id})" style="border-radius:50px;font-size:12px;padding:6px 14px">✓ Approve</button>
              <button class="btn btn-danger-outline btn-sm" onclick="declineRes(${res.id})" style="border-radius:50px;font-size:12px;padding:6px 14px">✕ Cancel</button>
            </div>
          </div>`).join('')}

      <!-- ALL TRANSACTIONS -->
      <h2 class="view-title" style="margin-top:1.5rem;display:flex;align-items:center;gap:8px">
        ${svg('book',16,'var(--burgundy)')} All Transactions
      </h2>
      <div class="table-header" style="grid-template-columns:2fr 1.5fr 1fr 1fr">
        <span>Book</span><span>Borrower</span><span>Status</span><span>Due</span>
      </div>
      ${borrows.length === 0
        ? '<div class="empty">No transactions yet.</div>'
        : borrows.slice().reverse().map(b=>`
          <div class="table-row" style="grid-template-columns:2fr 1.5fr 1fr 1fr">
            <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.bookTitle}</div>
            <div style="font-size:12px;color:var(--text-sec)">${b.username}</div>
            <div>${badge(b.status, b.status)}</div>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:12px;color:var(--text-sec)">${b.dueDate||'—'}</span>
              ${b.status==='borrowed' ? `<button class="btn btn-xs" onclick="returnBook(${b.id})">Return</button>` : ''}
            </div>
          </div>`).join('')}
    </div>`;
}

/* Borrow request actions */
async function approveReq(id) {
  const r = await fetch(`/api/requests/${id}/approve`, {method:'POST'});
  if (r.ok) { showToast('Borrow request approved!'); renderRequests(); }
  else { showToast('Failed to approve.', 'danger'); }
}
async function declineReq(id) {
  const r = await fetch(`/api/requests/${id}/decline`, {method:'POST'});
  if (r.ok) { showToast('Request declined.', 'warning'); renderRequests(); }
  else { showToast('Failed to decline.', 'danger'); }
}

/* Reservation actions */
async function approveRes(id) {
  const r = await fetch(`/api/reservations/${id}/approve`, {method:'POST'});
  if (r.ok) { showToast('Reservation approved — book issued!'); renderRequests(); }
  else { showToast('Failed to approve reservation.', 'danger'); }
}
async function declineRes(id) {
  const r = await fetch(`/api/reservations/${id}/decline`, {method:'POST'});
  if (r.ok) { showToast('Reservation cancelled.', 'warning'); renderRequests(); }
  else { showToast('Failed to cancel reservation.', 'danger'); }
}

/* Return book */
async function returnBook(id) {
  const r = await fetch(`/api/borrows/${id}/return`, {method:'POST'});
  if (r.ok) { showToast('Book returned successfully!'); renderRequests(); }
  else { showToast('Failed to process return.', 'danger'); }
}

/* ═══════════════════════════════════════════════
   BROWSE (student/teacher)
═══════════════════════════════════════════════ */
async function renderBrowse() {
  const [books, borrows, requests, reservations] = await Promise.all([
    fetch('/api/books').then(r=>r.json()),
    fetch('/api/borrows').then(r=>r.json()),
    fetch('/api/requests').then(r=>r.json()),
    fetch('/api/reservations').then(r=>r.json()),
  ]);
  window._browseBooks = books;
  window._myBorrows = borrows.filter(b=>b.userId===USER.id&&b.status==='borrowed');
  window._myPending = requests.filter(r=>r.studentId===USER.id&&r.status==='pending');
  window._myReservations = reservations.filter(r=>r.userId===USER.id&&r.status==='pending');
  const MAX = USER.role==='teacher' ? Infinity : 3;
  const categories = [...new Set(books.filter(b=>b.status!=='archived').map(b=>b.category))];

  document.getElementById('mainContent').innerHTML = `
    <div class="search-bar-wrap">
      <div class="search-bar">${svg('search',15,'var(--text-sec)')}<input id="browseSearch" placeholder="Search books…" oninput="filterBrowse()"></div>
      <button class="search-submit" onclick="filterBrowse()">${svg('search',15,'#fff')}</button>
    </div>
    <div style="padding:0.75rem 1.25rem 0">
      <select id="browseCat" class="select-input" onchange="filterBrowse()" style="width:100%;max-width:200px">
        <option value="all">All Categories</option>
        ${categories.map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
      ${USER.role==='student'?`<div class="info-bar" style="margin-top:8px">Active borrows: ${window._myBorrows.length} / ${MAX} · Pending: ${window._myPending.length}</div>`:''}
    </div>
    <div class="view-pad" style="padding-top:0.75rem">
      <div class="book-grid" id="bookGrid"></div>
    </div>`;
  filterBrowse();
}

function filterBrowse() {
  const q   = (document.getElementById('browseSearch')?.value||'').toLowerCase();
  const cat = document.getElementById('browseCat')?.value || 'all';
  const filtered = (window._browseBooks||[]).filter(b =>
    b.status!=='archived' &&
    (b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)) &&
    (cat==='all'||b.category===cat));

  document.getElementById('bookGrid').innerHTML = filtered.map(book => {
    const borrowed  = window._myBorrows.some(b=>b.bookId===book.id);
    const requested = window._myPending.some(r=>r.bookId===book.id);
    const reserved  = window._myReservations.some(r=>r.bookId===book.id);
    let actions = '';
    if (borrowed)       actions = badge('You borrowed','success');
    else if (requested) actions = badge('Request pending','pending');
    else if (reserved)  actions = badge('Reserved','info');
    else actions = `<div class="book-card-actions">
      <button class="btn-borrow" onclick="borrowBook(${book.id})" ${book.copies===0?'disabled':''}>Borrow</button>
      <button class="btn-reserve" onclick="reserveBook(${book.id})">Reserve</button>
    </div>`;
    const cover = book.cover_url ? `<img src="${book.cover_url}" alt="cover">` : `<div class="book-cover-placeholder">📚</div>`;
    return `
    <div class="book-card">
      <div class="book-cover-wrap">${cover}</div>
      <div class="book-card-body">
        <div class="book-card-title">${book.title}</div>
        <div class="book-card-author">by ${book.author}</div>
        <div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
          ${catBadge(book.category)}
          <span style="font-size:11px;color:var(--text-sec)">${book.copies} copies</span>
        </div>
        ${actions}
      </div>
    </div>`;
  }).join('');
}

async function borrowBook(bookId) {
  const MAX = USER.role==='teacher' ? Infinity : 3;
  if ((window._myBorrows.length+window._myPending.length)>=MAX) { showToast(`Borrow limit reached (${MAX}).`,'warning'); return; }
  await fetch('/api/requests',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bookId})});
  showToast('Borrow request submitted!');
  renderBrowse();
}

async function reserveBook(bookId) {
  if (window._myReservations.some(r=>r.bookId===bookId)) { showToast('Already reserved.','warning'); return; }
  await fetch('/api/reservations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bookId})});
  showToast('Book reserved!');
  renderBrowse();
}

/* ═══════════════════════════════════════════════
   MY BOOKS
═══════════════════════════════════════════════ */
async function renderMyBooks() {
  const [borrows, requests, reservations] = await Promise.all([
    fetch('/api/borrows').then(r=>r.json()),
    fetch('/api/requests').then(r=>r.json()),
    fetch('/api/reservations').then(r=>r.json()),
  ]);
  const myBorrows = borrows.filter(b=>b.userId===USER.id);
  const myPending = requests.filter(r=>r.studentId===USER.id);
  const myRes     = reservations.filter(r=>r.userId===USER.id);
  const active    = myBorrows.filter(b=>b.status==='borrowed'||b.status==='overdue');

  document.getElementById('mainContent').innerHTML = `
    <div class="view-pad" style="padding-top:1rem">
      <h3 class="view-title" style="display:flex;align-items:center;gap:6px">${svg('book-open',16,'var(--burgundy)')} Active Borrows</h3>
      ${active.length===0 ? '<div class="empty" style="margin-bottom:20px">No active borrows.</div>' : active.map(b=>{
        const od = new Date(b.dueDate)<new Date();
        return `<div class="card-row" style="border:0.5px solid ${od?'#F09595':'var(--border-ter)'};margin-bottom:10px">
          <div style="flex:1">
            <div style="font-weight:700;font-size:14px">${b.bookTitle}</div>
            <div style="font-size:12px;color:var(--text-sec);margin-top:2px">Due: ${b.dueDate} ${od?'<span style="color:#A32D2D;font-weight:700">— OVERDUE</span>':''}</div>
            ${b.penalty>0?`<div style="font-size:12px;color:#A32D2D;margin-top:2px">Penalty: ₱${b.penalty}</div>`:''}
          </div>
          ${badge(b.status,b.status)}
        </div>`;
      }).join('')}
      <h3 class="view-title" style="margin-top:1rem;display:flex;align-items:center;gap:6px">${svg('clipboard',16,'var(--burgundy)')} Borrow Requests</h3>
      ${myPending.length===0?'<div class="empty" style="margin-bottom:20px">No requests.</div>':myPending.map(r=>`<div class="card-row-sm">${r.bookTitle} ${badge(r.status,r.status)}</div>`).join('')}
      <h3 class="view-title" style="margin-top:1rem;display:flex;align-items:center;gap:6px">${svg('clock',16,'var(--burgundy)')} Reservations</h3>
      ${myRes.length===0?'<div class="empty">No reservations.</div>':myRes.map(r=>`<div class="card-row-sm">${r.bookTitle} ${badge(r.status,r.status)}</div>`).join('')}
    </div>`;
}

/* ═══════════════════════════════════════════════
   CLEARANCE
═══════════════════════════════════════════════ */
async function renderClearance() {
  const borrows = await fetch('/api/borrows').then(r=>r.json());
  const myBorrows = borrows.filter(b=>b.userId===USER.id);
  const active    = myBorrows.filter(b=>b.status==='borrowed'||b.status==='overdue');
  const totalPen  = myBorrows.reduce((s,b)=>s+(b.penalty||0),0);
  const cleared   = active.length===0 && totalPen===0;

  document.getElementById('mainContent').innerHTML = `
    <div class="view-pad" style="padding-top:1rem">
      <div style="background:${cleared?'#EAF3DE':'#FCEBEB'};border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem;text-align:center">
        <div style="font-size:36px;margin-bottom:8px">${cleared?'':''}</div>
        <div style="font-weight:800;font-size:18px;color:${cleared?'#3B6D11':'#A32D2D'}">Clearance: ${cleared?'Cleared':'Not Cleared'}</div>
        ${!cleared&&totalPen>0?`<div style="font-size:13px;margin-top:6px;color:#A32D2D">Outstanding penalty: ₱${totalPen.toFixed(2)}</div>`:''}
        ${!cleared&&active.length>0?`<div style="font-size:13px;margin-top:4px;color:#A32D2D">${active.length} unreturned book(s)</div>`:''}
      </div>
      ${active.length>0?`
        <h3 class="view-title">Unreturned Books</h3>
        ${active.map(b=>`<div class="card-row" style="margin-bottom:10px">
          <div style="flex:1"><div style="font-weight:700;font-size:14px">${b.bookTitle}</div><div style="font-size:12px;color:var(--text-sec)">Due: ${b.dueDate}</div></div>
          ${badge(b.status,b.status)}
        </div>`).join('')}`:''}
    </div>`;
}

/* ═══════════════════════════════════════════════
   CHATBOT
═══════════════════════════════════════════════ */
function toggleChat() {
  const c = document.getElementById('chatbot');
  const isVisible = c.style.display === 'flex';
  c.style.display = isVisible ? 'none' : 'flex';
  if (!isVisible) renderChatMessages();
}

function renderChatMessages() {
  const container = document.getElementById('chatMessages');
  container.innerHTML = chatHistory.map(m=>`
    <div style="display:flex;justify-content:${m.role==='user'?'flex-end':'flex-start'}">
      <div style="max-width:82%;padding:8px 12px;border-radius:${m.role==='user'?'12px 12px 2px 12px':'12px 12px 12px 2px'};background:${m.role==='user'?'var(--burgundy)':'var(--bg-sec)'};color:${m.role==='user'?'#fff':'var(--text-pri)'};font-size:13px;line-height:1.5;white-space:pre-wrap">${m.content}</div>
    </div>`).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  chatHistory.push({role:'user',content:msg});
  input.value='';
  const btn = document.getElementById('chatSend');
  btn.disabled=true; btn.textContent='…';
  renderChatMessages();
  try {
    const res = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistory.slice(-10)})});
    const data = await res.json();
    chatHistory.push({role:'assistant',content:data.reply});
  } catch { chatHistory.push({role:'assistant',content:"Sorry, I'm having trouble connecting right now."}); }
  btn.disabled=false; btn.textContent='Send';
  renderChatMessages();
}
</script>
